{% extends 'base.html' %}
{% load static %}


{% block links %}
    <link rel="stylesheet" href="{% static 'friends_app/css/friends.css'%}">
{% endblock %} 

{% block sidebar%}
    <button id='main-btn' class="settings-button select-button">Головна</button>
    <button id='requests-btn' class="settings-button">Запити</button>
    <button id='recomendations-btn' class="settings-button">Рекомендації</button>
    <button id='all-friends-btn' class="settings-button">Всі друзі</button>
{% endblock %}

{% block content %}
    <div id='main-cnt'>
        <h1>Головна</h1>
    </div>

    <div class="hidden" id="requests-cnt">
        <h1>Запити</h1>
    </div>

    <div class="hidden" id="recomendations-cnt">
        <h1>Рекомендації</h1>
    </div>

    <div class="hidden" id ='all-friends-cnt'>
        <h1>Всі друзі</h1>
    </div>
{% endblock %}
