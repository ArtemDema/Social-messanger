{% load static %}

<form method="post" action = "{% url 'update_profile' %}" id = 'profile-form' enctype="multipart/form-data">
    {% csrf_token %}
    <p>Картка профілю</p>
    <button type="button" class = 'edit visible-save'>Редагувати інформацію</button>
    <button type = 'submit' class = 'save visible-edit'>Зберегти</button>
    
    <div class="profile-img"></div>
    <h3>{{ user.first_name}} {{ user.last_name}}</h3>
    <p class="visible-save">{{user.username}}</p>
    <div class = 'visible-edit'>
        <p>Ім'я користувача</p>
        <input name = 'username' type = 'text' value="{{user.username}}">
    </div>
</form>
